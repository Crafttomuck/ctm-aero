name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - id: pack
        name: Read pack.toml
        run: |
          ver=$(grep -E '^version\s*=' pack/pack.toml | sed -E 's/^version\s*=\s*"([^"]+)".*/\1/')
          base="${{ github.event.repository.name }}"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "client_zip=${base}-client-${ver}.zip" >> "$GITHUB_OUTPUT"
          echo "server_zip=${base}-server-${ver}.zip" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Install moddl
        run: install -m 0755 .github/moddl /usr/local/bin/moddl

      - name: Build client zip
        working-directory: pack
        run: packwiz curseforge export -s client -o "../${{ steps.pack.outputs.client_zip }}"

      - name: Build server zip
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          (cd pack && packwiz curseforge export -s server -o /tmp/server-cf.zip)
          mkdir -p /tmp/server-cf-extracted
          unzip -q /tmp/server-cf.zip -d /tmp/server-cf-extracted

          mkdir -p server-build/mods
          moddl /tmp/server-cf-extracted/manifest.json server-build/mods

          if [ -d /tmp/server-cf-extracted/overrides ]; then
            cp -a /tmp/server-cf-extracted/overrides/. server-build/
          fi

          (cd server-build && zip -qr "../${{ steps.pack.outputs.server_zip }}" .)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.base }}-${{ steps.pack.outputs.version }}-${{ github.sha }}
          path: |
            ${{ steps.pack.outputs.client_zip }}
            ${{ steps.pack.outputs.server_zip }}

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.pack.outputs.version }}"
          client="${{ steps.pack.outputs.client_zip }}"
          server="${{ steps.pack.outputs.server_zip }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$client" "$server" --clobber
          else
            gh release create "$tag" "$client" "$server" \
              --target "$GITHUB_SHA" \
              --generate-notes \
              --title "$tag"
          fi
